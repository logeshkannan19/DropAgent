app = "dropshipping-ai-agent"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python scripts/seed_data.py"

[env]
  ENVIRONMENT = "production"

[[statics]]
  mountpoint = "/"
  startPath = "/app"

[httpOption]
  port = 8000

[processes]
  web = "uvicorn backend.api.main:app --host 0.0.0.0 --port 8000"
