services:
  - type: web
    name: dropshipping-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/dropshipping.db
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/v1/health
    autoDeploy:
      branch: main
